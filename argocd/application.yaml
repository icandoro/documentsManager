apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: documents-manager
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/icandoro/documentsManager.git
    targetRevision: main
    path: k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: ghiseul-cetateanului

  syncPolicy:
    syncOptions:
      - CreateNamespace=true
