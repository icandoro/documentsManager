# Template pentru secretul "documents-manager-secrets" - cheile noi pentru Gmail SMTP.
# NU contine valori reale. Completeaza placeholder-urile si aplica manual in cluster:
#
#   kubectl apply -f secret.example.yaml
#
# Secretul exista deja in cluster (creat manual, nu prin acest repo) si mai contine
# cheile APP_SECRET, MARIADB_USER, MARIADB_PASSWORD. `kubectl apply` face merge pe
# chei (nu sterge cheile existente care lipsesc din acest fisier), dar verifica
# oricum cu `kubectl get secret documents-manager-secrets -n ghiseul-cetateanului -o yaml`
# inainte si dupa.
#
# Acest fisier nu e inclus in kustomization.yaml - nu se aplica automat prin kustomize build.
apiVersion: v1
kind: Secret
metadata:
  name: documents-manager-secrets
  namespace: ghiseul-cetateanului
type: Opaque
stringData:
  # DSN SMTP pentru Gmail (necesita un "App Password" generat din contul Google,
  # nu parola normala - vezi https://myaccount.google.com/apppasswords).
  # @ din adresa de email trebuie encodat ca %40.
  MAILER_DSN: "smtp://GMAIL_USER%40gmail.com:GMAIL_APP_PASSWORD@smtp.gmail.com:587"
