services:
  backend:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: documentsmanager-backend
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
      - backend-var:/var/www/backend/var
    environment:
      APP_ENV: dev
      APP_SECRET: change-me-in-dev
      DATABASE_URL: "mysql://app:app_password@mariadb:3306/documents_manager?serverVersion=mariadb-11.4.5&charset=utf8mb4"
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1)(:[0-9]+)?$'
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "18000:8000"
    command: >
      sh -lc "
      composer install &&
      php -S 0.0.0.0:8000 -t public public/index.php
      "
    restart: unless-stopped

  frontend:
    image: node:22-alpine
    container_name: documentsmanager-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:18000
    depends_on:
      - backend
    ports:
      - "13000:3000"
    command: >
      sh -lc "
      npm install &&
      npm run dev -- --hostname 0.0.0.0 --webpack
      "
    restart: unless-stopped

  mariadb:
    image: mariadb:11.4
    container_name: documentsmanager-mariadb
    environment:
      MARIADB_DATABASE: documents_manager
      MARIADB_USER: app
      MARIADB_PASSWORD: app_password
      MARIADB_ROOT_PASSWORD: root_password
    volumes:
      - mariadb-data:/var/lib/mysql
    ports:
      - "13306:3306"
    healthcheck:
      test:
        - CMD
        - healthcheck.sh
        - --connect
        - --innodb_initialized
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    restart: unless-stopped

  adminer:
    image: adminer:latest
    container_name: documentsmanager-adminer
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "18080:8080"
    restart: unless-stopped

  claude:
    build:
      context: ./docker/claude
      dockerfile: Dockerfile
    container_name: documentsmanager-claude
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - claude-config:/root/.claude
      - claude-cache:/root/.cache
    stdin_open: true
    tty: true
    command: ["sleep", "infinity"]
    restart: unless-stopped

volumes:
  backend-var:
  frontend-node-modules:
  mariadb-data:
  claude-config:
  claude-cache: